    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#06060c;--accent:#00ebb0;--accent2:#9b6dff;
            --text:#e2e2ea;--dim:#5e5e74;--dim2:#9494a8;
            --border:rgba(255,255,255,0.10);--border-s:rgba(255,255,255,0.06);

        .hdr{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 20px;background:var(--glass);backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);border-bottom:1px solid var(--glass-b)}
        .hdr-left{display:flex;align-items:center;gap:14px}
        .back{font-family:'Space Mono',monospace;font-size:11px;color:var(--dim2);text-decoration:none;padding:8px 16px;border:1px solid var(--border);border-radius:8px;transition:all .25s;letter-spacing:1px;white-space:nowrap;min-height:36px;display:flex;align-items:center}
        .back:hover{color:var(--accent);border-color:var(--accent);box-shadow:0 0 14px rgba(0,235,176,0.1)}
        .hdr h1{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;white-space:nowrap}

        .panel.open{right:0}

<div class="tt" id="tt">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){

const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||window.innerWidth<768;
const tt=document.getElementById('tt');
const panel=document.getElementById('panel');
const notify=document.getElementById('notify');
const searchInput=document.getElementById('search');

// ============================================================
//  SCENE SETUP
// ============================================================

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000);
camera.position.set(0,0,250);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.setClearColor(0x06060c);
document.body.insertBefore(renderer.domElement,document.body.firstChild);

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

// ============================================================
//  CAMERA CONTROLLER
// ============================================================

const camCtrl={
    target:new THREE.Vector3(0,0,0),
    spherical:new THREE.Spherical(250,Math.PI/2,0),
    rotateSpeed:0.005,
    zoomSpeed:1.0,
    inertia:{phi:0,theta:0},
    friction:0.92,
    autoRotate:true,
    autoRotateSpeed:0.0005,
    idleTimer:0,
    idleThreshold:600,
    isRotating:false,
    isPanning:false,
    prevMouse:{x:0,y:0},
    panOffset:new THREE.Vector3()
};

function camUpdate(){
    camCtrl.spherical.theta+=camCtrl.inertia.theta;
    camCtrl.spherical.phi+=camCtrl.inertia.phi;
    camCtrl.inertia.theta*=camCtrl.friction;
    camCtrl.inertia.phi*=camCtrl.friction;
    camCtrl.spherical.phi=Math.max(0.15,Math.min(Math.PI-0.15,camCtrl.spherical.phi));
    camCtrl.spherical.radius=Math.max(80,Math.min(500,camCtrl.spherical.radius));

    camCtrl.idleTimer++;
    if(camCtrl.idleTimer>camCtrl.idleThreshold&&camCtrl.autoRotate){
        camCtrl.spherical.theta+=camCtrl.autoRotateSpeed;
    }

    const pos=new THREE.Vector3().setFromSpherical(camCtrl.spherical);
    camera.position.copy(pos.add(camCtrl.target));
    camera.lookAt(camCtrl.target);
}

// Mouse events
renderer.domElement.addEventListener('mousedown',e=>{
    if(e.button===0){camCtrl.isRotating=true}
    else if(e.button===2){camCtrl.isPanning=true}
    camCtrl.prevMouse={x:e.clientX,y:e.clientY};
    camCtrl.idleTimer=0;
});

renderer.domElement.addEventListener('mousemove',e=>{
    const dx=e.clientX-camCtrl.prevMouse.x;
    const dy=e.clientY-camCtrl.prevMouse.y;
    if(camCtrl.isRotating){
        camCtrl.spherical.theta-=dx*camCtrl.rotateSpeed;
        camCtrl.spherical.phi-=dy*camCtrl.rotateSpeed;
        camCtrl.inertia.theta=-dx*camCtrl.rotateSpeed*0.3;
        camCtrl.inertia.phi=-dy*camCtrl.rotateSpeed*0.3;
        camCtrl.idleTimer=0;
    }
    if(camCtrl.isPanning){
        const panScale=camCtrl.spherical.radius*0.001;
        camCtrl.target.x-=dx*panScale;
        camCtrl.target.y+=dy*panScale;
        camCtrl.idleTimer=0;
    }
    camCtrl.prevMouse={x:e.clientX,y:e.clientY};
});

window.addEventListener('mouseup',()=>{camCtrl.isRotating=false;camCtrl.isPanning=false});

renderer.domElement.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY>0?1.08:0.92;
    camCtrl.spherical.radius*=f;
    camCtrl.idleTimer=0;
},{passive:false});

renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());

// Touch events
let touch0=null,touchDist=0,touchMid={x:0,y:0};
renderer.domElement.addEventListener('touchstart',e=>{
    camCtrl.idleTimer=0;
    if(e.touches.length===1){
        touch0={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }else if(e.touches.length===2){
        const dx=e.touches[0].clientX-e.touches[1].clientX;
        const dy=e.touches[0].clientY-e.touches[1].clientY;
        touchDist=Math.sqrt(dx*dx+dy*dy);
        touchMid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    }
},{passive:true});

renderer.domElement.addEventListener('touchmove',e=>{
    e.preventDefault();
    camCtrl.idleTimer=0;
    if(e.touches.length===1&&touch0){
        const dx=e.touches[0].clientX-touch0.x;
        const dy=e.touches[0].clientY-touch0.y;
        camCtrl.spherical.theta-=dx*camCtrl.rotateSpeed;
        camCtrl.spherical.phi-=dy*camCtrl.rotateSpeed;
        camCtrl.inertia.theta=-dx*camCtrl.rotateSpeed*0.2;
        camCtrl.inertia.phi=-dy*camCtrl.rotateSpeed*0.2;
        touch0={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }else if(e.touches.length===2){
        const dx=e.touches[0].clientX-e.touches[1].clientX;
        const dy=e.touches[0].clientY-e.touches[1].clientY;
        const d=Math.sqrt(dx*dx+dy*dy);
        camCtrl.spherical.radius*=(touchDist/d);
        touchDist=d;
        // Pan
        const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
        const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const panScale=camCtrl.spherical.radius*0.002;
        camCtrl.target.x-=(mx-touchMid.x)*panScale;
        camCtrl.target.y+=(my-touchMid.y)*panScale;
        touchMid={x:mx,y:my};
    }
},{passive:false});

renderer.domElement.addEventListener('touchend',()=>{touch0=null});

// Double click reset
renderer.domElement.addEventListener('dblclick',e=>{
    if(hoveredNode<0){
        camCtrl.spherical.set(250,Math.PI/2,0);
        camCtrl.target.set(0,0,0);
        camCtrl.inertia.theta=0;camCtrl.inertia.phi=0;
    }
});

// ============================================================
//  BRAIN SHAPE GENERATION
// ============================================================

function generateBrainPoints(count){
    const pts=[];
    const golden=(1+Math.sqrt(5))/2;
    for(let i=0;i<count;i++){
        const theta=2*Math.PI*i/golden;
        const phi=Math.acos(1-2*(i+0.5)/count);
        let x=Math.sin(phi)*Math.cos(theta)*100;
        let y=Math.sin(phi)*Math.sin(theta)*70;
        let z=Math.cos(phi)*80;

        // Hemisphere gap
        if(Math.abs(x)<3)x=x>=0?3:-3;

        // Brain fold deformation
        x+=(x>0?1:-1)*Math.sin(y*0.05)*Math.cos(z*0.04)*5;

        // Frontal lobe - slightly wider
        if(z>30)x*=1.1;

        // Temporal - slightly wider at sides
        if(Math.abs(x)>60&&Math.abs(z)<20)y*=0.9;

        pts.push(new THREE.Vector3(x,y,z));
    }
    return pts;
}

const brainPoints=generateBrainPoints(isMobile?1000:2500);

// Create brain surface (faint particles)
const brainGeo=new THREE.BufferGeometry();
const brainPos=new Float32Array(brainPoints.length*3);
for(let i=0;i<brainPoints.length;i++){
    brainPos[i*3]=brainPoints[i].x;
    brainPos[i*3+1]=brainPoints[i].y;
    brainPos[i*3+2]=brainPoints[i].z;
}
brainGeo.setAttribute('position',new THREE.BufferAttribute(brainPos,3));
const brainMat=new THREE.PointsMaterial({color:0x334455,size:0.8,transparent:true,opacity:0.04,sizeAttenuation:true});
const brainMesh=new THREE.Points(brainGeo,brainMat);
scene.add(brainMesh);

// Brain group for breathing effect
const brainGroup=new THREE.Group();
scene.add(brainGroup);

// ============================================================
//  STARS
// ============================================================

const starCount=isMobile?1000:3000;
const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(starCount*3);
const starColors=new Float32Array(starCount*3);
const starSizes=new Float32Array(starCount);
for(let i=0;i<starCount;i++){
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    const r=600+Math.random()*400;
    starPos[i*3]=r*Math.sin(phi)*Math.cos(theta);
    starPos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    starPos[i*3+2]=r*Math.cos(phi);

    let cr=1,cg=1,cb=1;
    const rnd=Math.random();
    if(rnd<0.05){cr=0.6;cg=0.7;cb=1}
    else if(rnd<0.08){cr=1;cg=0.6;cb=0.5}
    else if(rnd<0.10){cr=1;cg=0.9;cb=0.4}
    starColors[i*3]=cr;starColors[i*3+1]=cg;starColors[i*3+2]=cb;
    starSizes[i]=0.5+Math.random()*1.5;
}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('color',new THREE.BufferAttribute(starColors,3));
starGeo.setAttribute('size',new THREE.BufferAttribute(starSizes,1));
const starMat=new THREE.PointsMaterial({size:1.2,transparent:true,opacity:0.6,vertexColors:true,sizeAttenuation:true});
scene.add(new THREE.Points(starGeo,starMat));

// ============================================================
//  NEBULAE (sprites with canvas textures)
// ============================================================

function createNebulaTexture(c){
    const cv=document.createElement('canvas');
    cv.width=256;cv.height=256;
    const ctx=cv.getContext('2d');
    const g=ctx.createRadialGradient(128,128,0,128,128,128);
    g.addColorStop(0,'rgba('+c[0]+','+c[1]+','+c[2]+',0.12)');
    g.addColorStop(0.4,'rgba('+c[0]+','+c[1]+','+c[2]+',0.04)');
    g.addColorStop(1,'rgba('+c[0]+','+c[1]+','+c[2]+',0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,256,256);
    return new THREE.CanvasTexture(cv);
}

const nebColors=[[0,235,176],[155,109,255],[68,136,255],[255,100,140]];
const nebulae=[];
for(let i=0;i<4;i++){
    const tex=createNebulaTexture(nebColors[i]);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.4,depthWrite:false});
    const sprite=new THREE.Sprite(mat);
    sprite.scale.set(400+Math.random()*150,400+Math.random()*150,1);
    sprite.position.set((Math.random()-0.5)*200,(Math.random()-0.5)*200,-300-Math.random()*200);
    scene.add(sprite);
    nebulae.push({sprite,speed:0.0002+Math.random()*0.0003,angle:Math.random()*Math.PI*2,orbitR:50+Math.random()*80,basePos:sprite.position.clone()});
}

// ============================================================
//  COSMIC DUST
// ============================================================

const dustCount=isMobile?50:100;
const dustGeo=new THREE.BufferGeometry();
const dustPos=new Float32Array(dustCount*3);
const dustVel=[];
for(let i=0;i<dustCount;i++){
    dustPos[i*3]=(Math.random()-0.5)*300;
    dustPos[i*3+1]=(Math.random()-0.5)*200;
    dustPos[i*3+2]=(Math.random()-0.5)*200;
    dustVel.push({x:(Math.random()-0.5)*0.05,y:(Math.random()-0.5)*0.05,z:(Math.random()-0.5)*0.05});
}
dustGeo.setAttribute('position',new THREE.BufferAttribute(dustPos,3));
const dustMat=new THREE.PointsMaterial({color:0xffffff,size:0.6,transparent:true,opacity:0.2,sizeAttenuation:true});
const dustMesh=new THREE.Points(dustGeo,dustMat);
scene.add(dustMesh);

// ============================================================
//  NODE TEXTURE (canvas-generated sprite)
// ============================================================

function createNodeTexture(r,g,b){
    const cv=document.createElement('canvas');
    cv.width=128;cv.height=128;
    const ctx=cv.getContext('2d');
    // Outer halo
    const g2=ctx.createRadialGradient(64,64,0,64,64,64);
    g2.addColorStop(0,'rgba('+r+','+g+','+b+',0.3)');
    g2.addColorStop(0.3,'rgba('+r+','+g+','+b+',0.1)');
    g2.addColorStop(0.7,'rgba('+r+','+g+','+b+',0.02)');
    g2.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
    ctx.fillStyle=g2;ctx.fillRect(0,0,128,128);
    // Core
    const g3=ctx.createRadialGradient(64,64,0,64,64,8);
    g3.addColorStop(0,'rgba(255,255,255,0.9)');
    g3.addColorStop(0.5,'rgba('+r+','+g+','+b+',0.5)');
    g3.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
    ctx.fillStyle=g3;ctx.beginPath();ctx.arc(64,64,12,0,Math.PI*2);ctx.fill();
    return new THREE.CanvasTexture(cv);
}

// Color cache
const texCache={};
function getNodeTexture(r,g,b){
    const key=r+','+g+','+b;
    if(!texCache[key])texCache[key]=createNodeTexture(r,g,b);
    return texCache[key];
}

function ageColor(fecha){
    if(!fecha)return{r:0,g:235,b:176};
    const days=(Date.now()-new Date(fecha).getTime())/86400000;
    if(days<=7)return{r:0,g:235,b:176};
    if(days<=30){const t=(days-7)/23;return{r:Math.round(t*68),g:Math.round(235-t*99),b:Math.round(176+t*79)}}
    const t=Math.min(1,(days-30)/60);
    return{r:Math.round(68+t*87),g:Math.round(136-t*27),b:255}
}

function nodeScale(pats){
    if(pats<=5)return 12;
    if(pats<=15)return 18;
    if(pats<=30)return 25;
    return 35;
}

// ============================================================
//  DATA & NODES
// ============================================================

let nodes=[],edges=[];
let nodeSprites=[];
let edgeLines=[];
let pulseSprites=[];
let loaded=false;
let prevTags=new Set();
let hoveredNode=-1;
let selectedNode=null;
let searchQ='';

// Assign brain positions to nodes
function assignBrainPosition(idx,related){
    if(idx<brainPoints.length){
        return brainPoints[idx].clone();
    }
    return new THREE.Vector3((Math.random()-0.5)*100,(Math.random()-0.5)*70,(Math.random()-0.5)*80);
}

async function loadData(){
    try{
        const r=await fetch('/api/cerebro');
        const d=await r.json();
        const temas=d.temas||[];
        const stats=d.estadisticas||{};
        const conns=d.conexiones||[];

        const currentTags=new Set(temas.map(t=>t.tag));
        if(loaded){
            for(const tag of currentTags){
                if(!prevTags.has(tag))birthEffect(tag);
            }
        }
        prevTags=currentTags;

        // Build node data
        const oldPositions={};
        nodes.forEach(n=>{oldPositions[n.tag]=n.position?n.position.clone():null});

        // Clear old sprites
        nodeSprites.forEach(s=>brainGroup.remove(s));
        edgeLines.forEach(l=>scene.remove(l));
        pulseSprites.forEach(p=>scene.remove(p));
        nodeSprites=[];edgeLines=[];pulseSprites=[];

        const tagIdx={};
        nodes=temas.map((t,i)=>{
            tagIdx[t.tag]=i;
            const col=ageColor(t.fecha_creacion);
            const sc=nodeScale(t.patrones);
            const old=oldPositions[t.tag];
            const pos=old||assignBrainPosition(i);

            // Create sprite
            const tex=getNodeTexture(col.r,col.g,col.b);
            const mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:1,depthWrite:false});
            const sprite=new THREE.Sprite(mat);
            sprite.position.copy(pos);
            sprite.scale.set(sc,sc,1);
            sprite.userData={idx:i};
            brainGroup.add(sprite);
            nodeSprites.push(sprite);

            return{
                tag:t.tag,pats:t.patrones,resps:t.respuestas,
                origenes:t.origenes||{},fecha:t.fecha_creacion,
                color:col,baseScale:sc,
                position:pos,
                pulseSpeed:0.3+Math.random()*0.4,
                pulsePh:Math.random()*Math.PI*2,
                dimAlpha:1,targetAlpha:1,
                sprite
            };
        });

        // Build edges
        edges=[];
        for(const c of conns){
            if(tagIdx[c.from]!==undefined&&tagIdx[c.to]!==undefined){
                const fi=tagIdx[c.from],ti=tagIdx[c.to];
                const a=nodes[fi],b=nodes[ti];

                // Line
                const pts=[];
                const steps=20;
                for(let s=0;s<=steps;s++){
                    const t=s/steps;
                    const x=a.position.x+(b.position.x-a.position.x)*t;
                    const y=a.position.y+(b.position.y-a.position.y)*t;
                    const z=a.position.z+(b.position.z-a.position.z)*t;
                    // Arc outward
                    const mid=Math.sin(t*Math.PI);
                    const dx=b.position.x-a.position.x;
                    const dy=b.position.y-a.position.y;
                    const len=Math.sqrt(dx*dx+dy*dy)||1;
                    pts.push(new THREE.Vector3(x+(-dy/len)*mid*10,y+(dx/len)*mid*10,z+mid*8));
                }
                const lineGeo=new THREE.BufferGeometry().setFromPoints(pts);
                const cr=Math.round((a.color.r+b.color.r)/2);
                const cg=Math.round((a.color.g+b.color.g)/2);
                const cb=Math.round((a.color.b+b.color.b)/2);
                const lineMat=new THREE.LineBasicMaterial({color:new THREE.Color(cr/255,cg/255,cb/255),transparent:true,opacity:0.08+c.peso*0.02});
                const line=new THREE.Line(lineGeo,lineMat);
                scene.add(line);
                edgeLines.push(line);

                // Pulse sprite
                const pulseMat=new THREE.SpriteMaterial({color:0xffffff,transparent:true,opacity:0.4,depthWrite:false});
                const pulse=new THREE.Sprite(pulseMat);
                pulse.scale.set(3,3,1);
                scene.add(pulse);
                pulseSprites.push(pulse);

                edges.push({from:fi,to:ti,peso:c.peso,line,pulse,pts,
                    pulseT:Math.random(),pulseSpeed:0.2+Math.random()*0.15,
                    active:Math.random()<0.3,activateAt:Math.random()*5
                });
            }
        }

        // Update header
        animEl(document.getElementById('s-temas'),stats.temas||0);
        animEl(document.getElementById('s-pat'),stats.patrones||0);
        animEl(document.getElementById('s-msg'),stats.mensajes_totales||0);

        if(!loaded)loaded=true;
    }catch(e){console.error(e)}
}

function animEl(el,target){
    const start=parseInt(el.textContent)||0;
    if(start===target)return;
    const t0=performance.now();
    function step(now){
        const p=Math.min(1,(now-t0)/800);
        el.textContent=Math.round(start+(target-start)*(1-Math.pow(1-p,3)));
        if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

// ============================================================
//  RAYCASTING
// ============================================================

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let rayFrame=0;

function updateRaycast(e){
    mouse.x=(e.clientX/innerWidth)*2-1;
    mouse.y=-(e.clientY/innerHeight)*2+1;
}

renderer.domElement.addEventListener('mousemove',e=>{
    updateRaycast(e);
    if(camCtrl.isRotating||camCtrl.isPanning)return;
    rayFrame++;
    if(rayFrame%3!==0)return;

    raycaster.setFromCamera(mouse,camera);
    const intersects=raycaster.intersectObjects(nodeSprites);

    if(intersects.length>0){
        const idx=intersects[0].object.userData.idx;
        hoveredNode=idx;
        renderer.domElement.style.cursor='pointer';
        showTooltip(idx,e.clientX,e.clientY);
    }else{
        hoveredNode=-1;
        renderer.domElement.style.cursor='default';
        hideTooltip();
    }
});

renderer.domElement.addEventListener('click',e=>{
    if(camCtrl.isRotating)return;
    raycaster.setFromCamera(mouse,camera);
    const intersects=raycaster.intersectObjects(nodeSprites);
    if(intersects.length>0){
        const idx=intersects[0].object.userData.idx;
        openPanel(idx);
        // Smooth zoom to node
        const n=nodes[idx];
        const dir=new THREE.Vector3().subVectors(camera.position,n.position).normalize();
        camCtrl.target.copy(n.position);
        camCtrl.spherical.radius=60;
        camCtrl.idleTimer=0;
    }
});

// Touch tap on node
renderer.domElement.addEventListener('touchend',e=>{
    if(e.changedTouches.length===1){
        const t=e.changedTouches[0];
        mouse.x=(t.clientX/innerWidth)*2-1;
        mouse.y=-(t.clientY/innerHeight)*2+1;
        raycaster.setFromCamera(mouse,camera);
        const intersects=raycaster.intersectObjects(nodeSprites);
        if(intersects.length>0){
            openPanel(intersects[0].object.userData.idx);
        }
    }
});

// ============================================================
//  TOOLTIP
// ============================================================

function showTooltip(idx,mx,my){
    const n=nodes[idx];
    document.getElementById('tt-tag').textContent='# '+n.tag;
    let b='<b>'+n.pats+'</b> patrones aprendidos<br><b>'+n.resps+'</b> respuestas posibles';
    if(n.fecha){
        const days=Math.round((Date.now()-new Date(n.fecha).getTime())/86400000);
        b+='<br>creado hace <b>'+days+'</b> dias';
    }
    document.getElementById('tt-body').innerHTML=b;
    const connected=[];
    edges.forEach(e=>{
        if(e.from===idx)connected.push(nodes[e.to].tag);
        else if(e.to===idx)connected.push(nodes[e.from].tag);
    });
    document.getElementById('tt-conn').textContent=connected.length?'conectado a: '+connected.join(', '):'';
    let tx=mx+18,ty=my-14;
    if(tx+290>innerWidth)tx=mx-300;
    if(ty+150>innerHeight)ty=innerHeight-160;
    if(ty<56)ty=56;
    tt.style.left=tx+'px';tt.style.top=ty+'px';
    tt.classList.add('vis');
}
function hideTooltip(){tt.classList.remove('vis')}

// ============================================================
//  SIDE PANEL
// ============================================================

function openPanel(idx){
    selectedNode=idx;
    const n=nodes[idx];
    let html='<div class="panel-tag"># '+n.tag+'</div>';
    html+='<div class="panel-stat">';
    html+='Patrones: <b>'+n.pats+'</b><br>';
    html+='Respuestas: <b>'+n.resps+'</b><br>';
    if(n.fecha){
        const d=new Date(n.fecha);
        html+='Creado: <b>'+d.toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'})+'</b>';
    }
    html+='</div>';
    if(Object.keys(n.origenes).length){
        html+='<div class="panel-divider"></div><div class="panel-section">ORIGENES</div>';
        for(const[k,v] of Object.entries(n.origenes)){
            html+='<span class="panel-badge">'+k+': '+v+'</span>';
        }
    }
    const connected=[];
    edges.forEach(e=>{
        if(e.from===idx)connected.push({tag:nodes[e.to].tag,idx:e.to,peso:e.peso});
        else if(e.to===idx)connected.push({tag:nodes[e.from].tag,idx:e.from,peso:e.peso});
    });
    if(connected.length){
        html+='<div class="panel-divider"></div><div class="panel-section">CONEXIONES</div>';
        connected.forEach(c=>{
            html+='<div class="panel-conn-item" data-idx="'+c.idx+'">'+c.tag+' ('+c.peso+' palabras)</div>';
        });
    }
    document.getElementById('panelContent').innerHTML=html;
    panel.classList.add('open');

    panel.querySelectorAll('.panel-conn-item').forEach(el=>{
        el.addEventListener('click',()=>openPanel(parseInt(el.dataset.idx)));
    });
}

function closePanel(){
    selectedNode=null;panel.classList.remove('open');
    camCtrl.spherical.radius=250;
    camCtrl.target.set(0,0,0);
}
document.getElementById('panelClose').addEventListener('click',closePanel);

// ============================================================
//  SEARCH
// ============================================================

searchInput.addEventListener('input',function(){
    searchQ=this.value.trim().toLowerCase();
    nodes.forEach(n=>{
        if(!searchQ){n.targetAlpha=1;return}
        n.targetAlpha=n.tag.toLowerCase().includes(searchQ)?1:0.08;
    });
});

// ============================================================
//  BIRTH EFFECT
// ============================================================

let birthParticles=[];
function birthEffect(tag){
    const idx=nodes.findIndex(n=>n.tag===tag);
    if(idx<0)return;
    const n=nodes[idx];
    for(let i=0;i<25;i++){
        const geo=new THREE.SphereGeometry(0.5,4,4);
        const mat=new THREE.MeshBasicMaterial({color:new THREE.Color(n.color.r/255,n.color.g/255,n.color.b/255),transparent:true,opacity:0.8});
        const mesh=new THREE.Mesh(geo,mat);
        mesh.position.copy(n.position);
        scene.add(mesh);
        const dir=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize();
        birthParticles.push({mesh,vel:dir.multiplyScalar(1+Math.random()*2),life:1,decay:0.015+Math.random()*0.01});
    }
    notify.textContent='Nueva sinapsis: '+tag;
    notify.classList.add('vis');
    setTimeout(()=>notify.classList.remove('vis'),3000);
}

// ============================================================
//  ANIMATION LOOP
// ============================================================

let time=0;
let fps=60,fCount=0,fTime=performance.now();

function animate(){
    requestAnimationFrame(animate);
    time+=0.016;

    camUpdate();

    // Brain breathing
    const breathe=1+Math.sin(time*0.5)*0.01;
    brainGroup.scale.set(breathe,breathe,breathe);

    // Update nebulae
    for(const nb of nebulae){
        nb.angle+=nb.speed;
        nb.sprite.position.x=nb.basePos.x+Math.cos(nb.angle)*nb.orbitR;
        nb.sprite.position.y=nb.basePos.y+Math.sin(nb.angle)*nb.orbitR;
    }

    // Update cosmic dust
    const dPos=dustGeo.attributes.position;
    for(let i=0;i<dustCount;i++){
        dPos.array[i*3]+=dustVel[i].x;
        dPos.array[i*3+1]+=dustVel[i].y;
        dPos.array[i*3+2]+=dustVel[i].z;
        // Gravity toward center
        const dx=-dPos.array[i*3]*0.0001;
        const dy=-dPos.array[i*3+1]*0.0001;
        const dz=-dPos.array[i*3+2]*0.0001;
        dustVel[i].x+=dx;dustVel[i].y+=dy;dustVel[i].z+=dz;
    }
    dPos.needsUpdate=true;

    // Update node animations
    for(let i=0;i<nodes.length;i++){
        const n=nodes[i];
        // Alpha dimming for search
        n.dimAlpha+=(n.targetAlpha-n.dimAlpha)*0.08;
        n.sprite.material.opacity=n.dimAlpha;

        // Breathing pulse
        const pulse=1+Math.sin(time*n.pulseSpeed+n.pulsePh)*0.08;
        const isHov=hoveredNode===i;
        const brightMul=isHov?1.3:1;
        const s=n.baseScale*pulse*brightMul;
        n.sprite.scale.set(s,s,1);
    }

    // Highlight hovered node's connections
    for(let ei=0;ei<edges.length;ei++){
        const e=edges[ei];
        const isHovEdge=hoveredNode>=0&&(e.from===hoveredNode||e.to===hoveredNode);
        e.line.material.opacity=isHovEdge?0.35:(0.06+e.peso*0.02);
        e.line.material.opacity*=Math.min(nodes[e.from].dimAlpha,nodes[e.to].dimAlpha);

        // Pulse animation
        e.pulseT+=e.pulseSpeed*0.016;
        if(e.pulseT>1)e.pulseT-=1;

        // Rotate which pulses are active
        const cycleT=time%5;
        e.active=(cycleT>e.activateAt&&cycleT<e.activateAt+2)||isHovEdge;

        if(e.active&&e.pts.length>1){
            const idx=Math.floor(e.pulseT*(e.pts.length-1));
            const nextIdx=Math.min(idx+1,e.pts.length-1);
            const frac=e.pulseT*(e.pts.length-1)-idx;
            e.pulse.position.lerpVectors(e.pts[idx],e.pts[nextIdx],frac);
            e.pulse.material.opacity=isHovEdge?0.6:0.3;
            e.pulse.scale.set(isHovEdge?4:2.5,isHovEdge?4:2.5,1);
            e.pulse.visible=true;
        }else{
            e.pulse.visible=false;
        }
    }

    // Birth particles
    for(let i=birthParticles.length-1;i>=0;i--){
        const bp=birthParticles[i];
        bp.mesh.position.add(bp.vel);
        bp.vel.multiplyScalar(0.96);
        bp.life-=bp.decay;
        bp.mesh.material.opacity=bp.life*0.8;
        if(bp.life<=0){
            scene.remove(bp.mesh);
            bp.mesh.geometry.dispose();
            bp.mesh.material.dispose();
            birthParticles.splice(i,1);
        }
    }

    // FPS monitoring
    fCount++;
    const now=performance.now();
    if(now-fTime>1000){
        fps=fCount;fCount=0;fTime=now;
        if(fps<24&&dustMesh.visible){
            dustMesh.visible=false;
        }
        if(fps<18){
            nebulae.forEach(nb=>{nb.sprite.visible=false});
            edges.forEach(e=>{e.pulse.visible=false});
        }
    }

    renderer.render(scene,camera);
}

// ============================================================
//  INIT
// ============================================================

loadData();
setInterval(loadData,120000);
animate();

})();
