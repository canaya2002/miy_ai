<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebro - IA Experimental</title>

    <meta property="og:title" content="El Cerebro de la IA Experimental">
    <meta property="og:description" content="Mira todo lo que sabe esta IA creada desde cero. Cada tema fue ensenado por personas reales.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a25;
            --border: #2a2a3a;
            --text: #e0e0e8;
            --text-dim: #6a6a80;
            --accent: #00ff88;
            --accent-dim: #00ff8822;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--bg);
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 500;
        }

        .header h1 span { color: var(--accent); }

        .back-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 7px 16px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* CONTENIDO */
        .contenido {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* STATS GLOBALES */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .stat-card .valor {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* TITULO SECCION */
        .seccion-titulo {
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        /* TEMAS */
        .temas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .tema-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            transition: border-color 0.2s;
        }

        .tema-card:hover {
            border-color: var(--accent);
        }

        .tema-nombre {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .tema-nombre::before {
            content: '# ';
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .tema-stats {
            display: flex;
            gap: 14px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .tema-stats span strong {
            color: var(--text);
        }

        .tema-origen {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .origen-badge {
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--surface2);
            border: 1px solid var(--border);
        }

        .origen-badge.manual { color: var(--accent); border-color: #1a3a2a; }
        .origen-badge.auto_refuerzo { color: #88aaff; border-color: #1a2a3a; }
        .origen-badge.auto_contexto { color: #ffaa44; border-color: #3a2a1a; }

        .tema-fecha {
            font-size: 10px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            margin-top: 8px;
        }

        /* VACIO */
        .vacio {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .vacio p {
            font-size: 14px;
            line-height: 1.6;
        }

        /* LOADING */
        .cargando {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .temas-grid { grid-template-columns: 1fr; }
            .contenido { padding: 20px 14px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="logo">IA</div>
            <h1>El <span>Cerebro</span></h1>
        </div>
        <a href="/" class="back-btn">VOLVER AL CHAT</a>
    </div>

    <!-- CONTENIDO -->
    <div class="contenido">
        <div id="contenido" class="cargando">
            Cargando cerebro...
        </div>
    </div>

    <script>
        async function cargar() {
            const container = document.getElementById('contenido');

            try {
                const res = await fetch('/api/cerebro');
                const data = await res.json();

                const stats = data.estadisticas;
                const temas = data.temas;

                let html = '';

                // Stats globales
                html += `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="valor">${stats.temas}</div>
                            <div class="label">temas</div>
                        </div>
                        <div class="stat-card">
                            <div class="valor">${stats.patrones}</div>
                            <div class="label">patrones</div>
                        </div>
                        <div class="stat-card">
                            <div class="valor">${stats.respuestas}</div>
                            <div class="label">respuestas</div>
                        </div>
                        <div class="stat-card">
                            <div class="valor">${stats.mensajes_totales}</div>
                            <div class="label">mensajes</div>
                        </div>
                        <div class="stat-card">
                            <div class="valor">${stats.sesiones_totales}</div>
                            <div class="label">personas</div>
                        </div>
                        <div class="stat-card">
                            <div class="valor">${stats.entrenamientos}</div>
                            <div class="label">entrenamientos</div>
                        </div>
                    </div>
                `;

                // Temas
                html += '<div class="seccion-titulo">// TEMAS QUE CONOCE</div>';

                if (temas.length === 0) {
                    html += '<div class="vacio"><p>La IA todavia no sabe nada. Se el primero en ensenarle algo.</p></div>';
                } else {
                    html += '<div class="temas-grid">';

                    for (const tema of temas) {
                        // Badges de origen
                        let origenes = '';
                        for (const [origen, count] of Object.entries(tema.origenes || {})) {
                            origenes += `<span class="origen-badge ${origen}">${origen}: ${count}</span>`;
                        }

                        // Formatear fecha
                        let fecha = '';
                        if (tema.fecha_creacion) {
                            const d = new Date(tema.fecha_creacion);
                            fecha = d.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
                        }

                        html += `
                            <div class="tema-card">
                                <div class="tema-nombre">${tema.tag}</div>
                                <div class="tema-stats">
                                    <span><strong>${tema.patrones}</strong> patrones</span>
                                    <span><strong>${tema.respuestas}</strong> respuestas</span>
                                </div>
                                <div class="tema-origen">${origenes}</div>
                                ${fecha ? `<div class="tema-fecha">desde ${fecha}</div>` : ''}
                            </div>
                        `;
                    }

                    html += '</div>';
                }

                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = '<div class="vacio"><p>Error cargando datos del cerebro.</p></div>';
            }
        }

        cargar();
    </script>
</body>
</html>
