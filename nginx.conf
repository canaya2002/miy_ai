upstream ia_app {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=chat:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ensenar:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

server {
    listen 80;
    server_name _;

    # Gzip (libera a Flask de comprimir)
    gzip on;
    gzip_vary on;
    gzip_min_length 500;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Buffers
    client_max_body_size 1m;
    client_body_buffer_size 16k;

    # Timeouts
    proxy_connect_timeout 10;
    proxy_send_timeout 30;
    proxy_read_timeout 60;

    # Headers comunes para proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # Archivos estaticos (cache agresivo)
    location /static/ {
        alias /home/ubuntu/miy_ai/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon/manifest (cache largo)
    location = /manifest.json {
        proxy_pass http://ia_app;
        expires 7d;
    }

    # SSE: sin buffering
    location /stream/ {
        proxy_pass http://ia_app;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 3600;
    }

    # Chat API
    location /chat {
        limit_req zone=chat burst=5 nodelay;
        proxy_pass http://ia_app;
    }

    # Ensenar API
    location /ensenar {
        limit_req zone=ensenar burst=2 nodelay;
        proxy_pass http://ia_app;
    }

    # Stats (cacheable)
    location /stats {
        proxy_pass http://ia_app;
        proxy_cache_valid 200 30s;
    }

    # Cerebro API (cacheable)
    location /api/cerebro {
        proxy_pass http://ia_app;
        proxy_cache_valid 200 60s;
    }

    # Health (sin rate limit)
    location /health {
        proxy_pass http://ia_app;
    }

    # Todo lo demas
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://ia_app;
    }
}
